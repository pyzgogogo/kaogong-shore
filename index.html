<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>上岸 · 美丽的张晓彤</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ====== Section 1: Hero + Lighthouse ====== -->
  <section id="hero">
    <canvas id="stars-canvas" aria-hidden="true"></canvas>

    <!-- CSS Lighthouse -->
    <div class="lighthouse" aria-hidden="true">
      <div class="light-beam"></div>
      <div class="light-glow"></div>
      <div class="tower-top"></div>
      <div class="tower-body">
        <div class="window w1"></div>
        <div class="window w2"></div>
        <div class="window w3"></div>
      </div>
      <div class="tower-base"></div>
      <div class="island"></div>
    </div>

    <div class="hero-text">
      <h1 class="hero-title">美丽的张晓彤</h1>
      <p class="hero-subtitle">我们在等<span class="gold-dot">你</span>上岸</p>
      <p class="hero-desc">灯塔一直亮着，光的方向就是你要去的地方</p>
    </div>

    <!-- Sea waves -->
    <div class="sea-waves" aria-hidden="true">
      <div class="sea-wave w1"></div>
      <div class="sea-wave w2"></div>
      <div class="sea-wave w3"></div>
    </div>

    <!-- Scroll hint -->
    <div class="scroll-hint" aria-hidden="true">
      <span></span>
    </div>
  </section>

  <!-- ====== Section 2: Countdown ====== -->
  <section id="countdown">
    <div class="section-label">灯塔守望</div>
    <h2 class="section-title">距离笔试还有</h2>
    <div class="countdown-grid" id="countdown-grid">
      <div class="cd-card">
        <span class="cd-number" id="cd-days">00</span>
        <span class="cd-label">天</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-card">
        <span class="cd-number" id="cd-hours">00</span>
        <span class="cd-label">时</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-card">
        <span class="cd-number" id="cd-mins">00</span>
        <span class="cd-label">分</span>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-card">
        <span class="cd-number" id="cd-secs">00</span>
        <span class="cd-label">秒</span>
      </div>
    </div>
    <p class="countdown-msg" id="countdown-msg"></p>
  </section>

  <!-- ====== Section 3: Daily Quote ====== -->
  <section id="quote">
    <svg class="wave-divider" viewBox="0 0 1200 120" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,60 C200,120 400,0 600,60 C800,120 1000,0 1200,60 L1200,120 L0,120 Z" fill="currentColor"/>
    </svg>
    <div class="section-label">浪潮</div>
    <blockquote id="daily-quote"></blockquote>
    <p class="attribution" id="quote-attribution"></p>
  </section>

  <!-- ====== Section 4: Journey / Sailing Map ====== -->
  <section id="journey">
    <div class="section-label">航行图</div>
    <h2 class="section-title">驶向岸边</h2>
    <div class="timeline-wrapper">
      <div class="timeline-track">
        <div class="timeline-progress" id="timeline-progress"></div>
        <div class="timeline-boat" id="timeline-boat">
          <svg viewBox="0 0 40 40" width="32" height="32" aria-hidden="true">
            <path d="M20 5 L32 28 L8 28 Z" fill="#f0c060"/>
            <rect x="18" y="28" width="4" height="8" rx="1" fill="#8eaccd"/>
            <path d="M20 2 L20 10" stroke="#f5efe0" stroke-width="1.5"/>
            <circle cx="20" cy="13" r="2.5" fill="#f0c060" opacity="0.8"/>
          </svg>
        </div>
      </div>
      <div class="timeline-nodes" id="timeline-nodes"></div>
    </div>
  </section>

  <!-- ====== Section 4.5: Daily Check-in ====== -->
  <section id="checkin">
    <div class="section-label">每日打卡</div>
    <h2 class="section-title">今天你学习了吗？</h2>
    <p class="checkin-streak" id="checkin-streak">已连续学习 <strong>0</strong> 天</p>

    <div class="checkin-circle-container">
      <button class="checkin-circle" id="checkin-btn" aria-label="今日打卡">
        <span class="checkin-icon">📝</span>
        <span class="checkin-label">点我打卡</span>
      </button>
      <div class="checkin-ripple" id="checkin-ripple"></div>
    </div>

    <p class="checkin-feedback" id="checkin-feedback"></p>

    <div class="heatmap-container">
      <p class="heatmap-title">最近 21 天</p>
      <div class="heatmap" id="heatmap"></div>
      <div class="heatmap-legend">
        <span>更早</span>
        <span class="legend-cell empty"></span>
        <span class="legend-cell light"></span>
        <span class="legend-cell full"></span>
        <span>今天</span>
      </div>
    </div>
  </section>

  <!-- ====== Section 5: Star Energy ====== -->
  <section id="energy">
    <div class="section-label">收集星光</div>
    <h2 class="section-title">点亮能量瓶</h2>
    <p class="energy-hint">点击散落的星星，为晓彤积攒上岸能量</p>

    <!-- Star field -->
    <div class="star-field" id="star-field"></div>

    <!-- Energy bottle -->
    <div class="bottle-container">
      <div class="bottle" id="bottle" role="img" aria-label="能量瓶">
        <svg viewBox="0 0 80 100" width="60" height="75">
          <path d="M25,45 L25,20 Q25,10 30,8 L30,3 L50,3 L50,8 Q55,10 55,20 L55,45 Q60,50 60,65 Q60,85 40,95 Q20,85 20,65 Q20,50 25,45 Z"
                fill="none" stroke="#8eaccd" stroke-width="2"/>
          <rect x="20" y="60" width="40" height="0" id="bottle-fill" fill="#f0c060" opacity="0.5" rx="2">
          </rect>
        </svg>
      </div>
      <p class="bottle-count"><span id="star-count">0</span> / <span id="star-total">8</span></p>
    </div>

    <!-- Hidden message (revealed on completion) -->
    <div class="hidden-message" id="hidden-message">
      <p id="hidden-text"></p>
    </div>
  </section>

  <!-- ====== Section 6: Mailbox ====== -->
  <section id="mailbox">
    <div class="section-label">悄悄话信箱</div>
    <p class="mailbox-hint">点击信封，打开一封给晓彤的信</p>

    <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="打开信箱">
      <svg viewBox="0 0 120 80" width="90" height="60" aria-hidden="true">
        <rect x="10" y="15" width="100" height="55" rx="4" fill="#1a3a5c" stroke="#8eaccd" stroke-width="1.5"/>
        <path d="M10,15 L60,50 L110,15" fill="none" stroke="#8eaccd" stroke-width="1.5"/>
        <circle cx="60" cy="42" r="6" fill="none" stroke="#f0c060" stroke-width="1.2"/>
      </svg>
      <span class="envelope-label">拆开看看</span>
    </div>

    <!-- Revealed message card -->
    <div class="letter-card" id="letter-card">
      <p id="letter-text"></p>
      <button class="letter-close" id="letter-close">收好 ✉️</button>
    </div>
  </section>

  <!-- ====== Section 6.5: Photo Corner ====== -->
  <section id="photos">
    <div class="section-label">回忆角落</div>
    <h2 class="section-title">这些瞬间，都在等岸上的你</h2>
    <div class="photo-scroll" id="photo-scroll">
      <!-- Photos injected by JS -->
    </div>
    <p class="photo-hint">左右滑动 ← →</p>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <div class="lightbox-bg"></div>
      <img src="" alt="" id="lightbox-img">
      <button class="lightbox-close" id="lightbox-close">✕</button>
    </div>
  </section>

  <!-- ====== Section 7: Breathing ====== -->
  <section id="breathing">
    <div class="section-label">喘息角落</div>
    <h2 class="section-title">给自己一分钟</h2>
    <p class="breath-hint">累了的时候，来这里呼吸一下</p>

    <div class="breath-circle-container">
      <div class="breath-circle" id="breath-circle">
        <div class="breath-ring"></div>
        <span class="breath-text" id="breath-text">准备好了吗</span>
      </div>
    </div>

    <button class="breath-btn" id="breath-btn" aria-label="开始呼吸练习">开始呼吸</button>
  </section>

  <!-- ====== Section 8: Footer ====== -->
  <footer id="footer">
    <p class="footer-main">你一定会上岸</p>
    <p class="footer-emoji">🌊✨</p>
    <p class="footer-sub">美丽的张晓彤，我们都在岸边等你</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
